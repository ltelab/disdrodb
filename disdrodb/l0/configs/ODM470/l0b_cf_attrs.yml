  flag_meanings: >
    missing
    noise
    no_precipitation
    drizzle_light
    drizzle_moderate
    drizzle_heavy
    drizzle_with_rain_light
    drizzle_with_rain_moderate_or_heavy
    rain_light
    rain_moderate
    rain_heavy
    rain_or_drizzle_with_snow_light
    rain_or_drizzle_with_snow_heavy
    snow_light
    snow_moderate
    snow_heavy
    snow_grains
    ice_pellets_light
    ice_pellets_moderate_or_heavy
    hail_light
    hail_heavy
  comment: WMO SYNOP present weather codes (Table 4677, ww).
precip_flag:
  description: Precipitation classification
  long_name: Precipitation flag
  flag_meanings: "true_zero_value rain snow mixed_phase"
