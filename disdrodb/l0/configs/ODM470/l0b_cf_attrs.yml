precipitation_rate:
  description: Total precipitation intensity
  long_name: Total precipitation intensity
  units: mm/h
reference_voltage:
  description: Reference voltage
  long_name: Reference_voltage
  units: "V"
relative_wind_speed:
  description: Relative wind speed
  long_name: Relative wind speed
