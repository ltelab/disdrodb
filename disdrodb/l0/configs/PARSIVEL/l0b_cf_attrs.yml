weather_code_synop_4680:
  description: SYNOP weather code according to table 4680 of Parsivel documentation
  long_name: Weather code SYNOP 4680
  units: ""
  flag_values: [-2, -1, 0, 51, 52, 53, 57, 58, 61, 62, 63, 67, 68, 71, 72, 73, 74, 75, 76, 77, 89, 90]
  flag_meanings: >
    missing
    noise
    no_precipitation
    drizzle_light
    drizzle_moderate
    drizzle_heavy
    drizzle_with_rain_light
    drizzle_with_rain_moderate_or_heavy
    rain_light
    rain_moderate
    rain_heavy
    rain_or_drizzle_with_snow_light
    rain_or_drizzle_with_snow_heavy
    snow_light
    snow_moderate
    snow_heavy
    ice_pellets_light
    ice_pellets_moderate
    ice_pellets_heavy
    snow_grains
    hail_light
    hail_heavy
  comment: WMO SYNOP present weather codes (Table 4680, wawa).
