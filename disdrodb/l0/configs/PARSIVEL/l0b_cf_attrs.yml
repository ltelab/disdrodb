    rain_heavy
    rain_or_drizzle_with_snow_light
    rain_or_drizzle_with_snow_moderate
    rain_or_drizzle_with_snow_heavy
    snow_light
    snow_moderate
    snow_heavy
    snow_grains
    ice_pellets
    graupel
    hail
  comment: NWS categorical present weather codes.
