weather_code_metar_4678:
  description: METAR/SPECI weather code according to table 4678 of Parsivel documentation
  long_name: Weather code METAR 4678
  units: ""
  flag_values: ["NP", "-DZ", "DZ", "+DZ", "-RADZ", "RADZ", "+RADZ",
              "-RA", "RA", "+RA", "-RASN", "RASN", "+RASN",
              "-SN", "SN", "+SN", "SG",
              "-PL", "PL", "+PL", "-GS", "GS", "+GS", "-GR", "GR"]
  flag_meanings: >
    no_precipitation
    drizzle_light
    drizzle_moderate
    drizzle_heavy
    drizzle_with_rain_light
    drizzle_with_rain_moderate
    drizzle_with_rain_heavy
    rain_light
    rain_moderate
    rain_heavy
    rain_or_drizzle_with_snow_light
    rain_or_drizzle_with_snow_moderate
    rain_or_drizzle_with_snow_heavy
    snow_light
    snow_moderate
    snow_heavy
    snow_grains
    ice_pellets_light
    ice_pellets_moderate
    ice_pellets_heavy
    graupel_light
    graupel_moderate
    graupel_heavy
    hail_light
    hail_moderate
  comment: METAR present weather codes (WMO No. 306).
weather_code_nws:
  description: NWS weather code according to Parsivel documentation
  long_name: Weather code NWS
  units: ""
  flag_values: ["C", "L-", "L", "L+", "RL-", "RL", "RL+", "R-", "R", "R+",
                "RLS-", "RLS", "RLS+", "S-", "S", "S+", "SG", "IP", "SP", "A"]
  flag_meanings: >
    no_precipitation
    drizzle_light
    drizzle_moderate
    drizzle_heavy
    drizzle_with_rain_light
    drizzle_with_rain_moderate
    drizzle_with_rain_heavy
    rain_light
